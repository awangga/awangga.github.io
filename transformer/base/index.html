<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Interaktif Transformer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* slate-900 */
            color: #e2e8f0; /* slate-200 */
            overflow: hidden;
        }
        
        .fade-in {
            animation: fadeIn 0.8s ease-in forwards;
        }

        .slide-up {
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .word-block {
            transition: all 0.5s ease;
        }

        .pulse-glow {
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.5); }
            50% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.8); }
            100% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.5); }
        }

        /* Attention Lines */
        svg.attention-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .math-text {
            font-family: 'Courier New', Courier, monospace;
            background: #1e293b;
            padding: 2px 6px;
            border-radius: 4px;
            color: #38bdf8;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center z-10">
        <div>
            <h1 class="text-2xl font-bold text-white"><i class="fas fa-network-wired text-blue-400 mr-2"></i> Attention Is All You Need</h1>
            <p class="text-sm text-slate-400">Simulasi Interaktif Arsitektur Transformer untuk Pemula</p>
        </div>
        <div class="flex space-x-2">
            <span class="px-3 py-1 bg-slate-700 rounded-full text-xs font-semibold text-slate-300">NIPS 2017</span>
            <span class="px-3 py-1 bg-blue-900/50 text-blue-300 border border-blue-700 rounded-full text-xs font-semibold">Self-Attention</span>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar Controls & Explanation -->
        <div class="w-1/3 bg-slate-800 p-6 flex flex-col border-r border-slate-700 shadow-xl z-10 overflow-y-auto">
            <div id="step-indicator" class="flex justify-between mb-8">
                <!-- Dots generated by JS -->
            </div>

            <div class="flex-1">
                <h2 id="step-title" class="text-3xl font-bold text-white mb-4 slide-up">Memuat...</h2>
                <div id="step-desc" class="text-lg text-slate-300 leading-relaxed space-y-4 slide-up">
                    <!-- Content generated by JS -->
                </div>
            </div>

            <div class="mt-8 flex justify-between items-center">
                <button id="btn-prev" class="px-5 py-2.5 bg-slate-700 hover:bg-slate-600 rounded text-white font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fas fa-arrow-left mr-2"></i> Sebelumnya
                </button>
                <button id="btn-next" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 rounded text-white font-medium shadow-lg transition-colors shadow-blue-900/50">
                    Selanjutnya <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>

        <!-- Canvas for Animation -->
        <div class="w-2/3 bg-slate-900 relative flex items-center justify-center p-10 overflow-hidden" id="canvas-container">
            <svg class="attention-lines" id="svg-canvas"></svg>
            <div id="animation-stage" class="relative w-full max-w-4xl h-[500px] flex items-center justify-center">
                <!-- Visuals generated by JS -->
            </div>
        </div>
    </div>

    <script>
        // --- Data & State ---
        const sentence = ["Bank", "di", "sungai", "itu", "indah"];
        let currentStep = 0;

        const steps = [
            {
                title: "1. Teks Masukan (Input)",
                desc: `<p>Sebelum Transformer bisa melakukan apa-apa, kita butuh sebuah kalimat.</p>
                       <p>Mari kita gunakan kalimat: <strong>"Bank di sungai itu indah"</strong>.</p>
                       <p>Langkah pertama adalah <strong>Tokenisasi</strong>. Komputer memecah kalimat dan mencari setiap kata di dalam "Kamus" raksasa miliknya untuk diberi ID unik berupa angka (misalnya: "Bank" = ID 843).</p>`,
                animate: renderInput
            },
            {
                title: "2. Input Embedding",
                desc: `<p>Berdasarkan makalah, model menukar ID tersebut menjadi vektor (deretan angka) berdimensi <span class="math-text">d_model = 512</span>.</p>
                       <p><strong>Penting:</strong> Pada tahap ini, nilainya <strong>sepenuhnya independen (kaku)</strong>. Kata "Bank" selalu mendapat angka yang persis sama. Model masih "buta" dan belum tahu apakah ini "Bank Uang" atau "Bank Tepi Sungai".</p>
                       <p class="text-sm text-slate-400 mt-4 border-l-4 border-blue-500 pl-3">Dalam simulasi ini, kita tampilkan 3 angka saja sebagai contoh.</p>`,
                animate: renderEmbedding
            },
            {
                title: "3. Positional Encoding",
                desc: `<p><strong>Masalah:</strong> Transformer memproses semua kata secara bersamaan (paralel), tidak satu-satu seperti RNN. Jadi model tidak tahu urutan kata!</p>
                       <p><strong>Solusi (Bagian 3.5):</strong> Kita menambahkan sinyal gelombang <em>Sine</em> dan <em>Cosine</em> ke dalam vektor. Ini memberi tahu model posisi setiap kata (kata ke-1, ke-2, dst).</p>`,
                animate: renderPositionalEncoding
            },
            {
                title: "4. Query, Key, Value",
                desc: `<p>Ini adalah inti dari <strong>Self-Attention</strong>.</p>
                       <p>Setiap kata menciptakan 3 vektor baru dari dirinya sendiri:
                       <br>• <span class="text-pink-400 font-bold">Query (Q):</span> Apa yang sedang saya cari?
                       <br>• <span class="text-yellow-400 font-bold">Key (K):</span> Siapa saya? (label)
                       <br>• <span class="text-green-400 font-bold">Value (V):</span> Apa makna sebenarnya saya?</p>
                       <p>Model mengalikan Input Embedding dengan matriks bobot yang dipelajari untuk mendapatkan Q, K, dan V ini.</p>`,
                animate: renderQKV
            },
            {
                title: "5. Scaled Dot-Product Attention",
                desc: `<p>Di sinilah Transformer memecahkan ambiguitas! Kata "Bank" bisa berarti gedung keuangan atau tepi sungai.</p>
                       <p><span class="text-pink-400">Query</span> dari "Bank" mulai "bertanya" dan mencocokkan dirinya dengan <span class="text-yellow-400">Key</span> kata lain.</p>
                       <p>Skor kecocokan tertinggi ternyata ada pada kata "sungai". Model lalu mengambil <span class="text-green-400">Value</span> dari "sungai" dan menyimpulkan: <em>"Aha! Ini pasti tepi sungai, BUKAN tempat uang!"</em></p>
                       <p class="text-xs bg-slate-800 p-2 rounded mt-2">Rumus: <span class="math-text">Attention(Q,K,V) = softmax(QK^T / √d_k)V</span></p>`,
                animate: renderAttentionLines
            },
            {
                title: "6. Vektor Berkonteks (Output)",
                desc: `<p>Setelah Self-Attention, vektor kata "Bank" tidak lagi sekadar berdiri sendiri.</p>
                       <p>Vektor tersebut sekarang telah <strong>diperkaya dengan konteks</strong> dari seluruh kalimat (terutama dari kata "sungai").</p>
                       <p>Proses ini bisa diulang berkali-kali (<span class="math-text">N=6</span> layer) agar model semakin paham makna mendalam dari kalimat tersebut.</p>`,
                animate: renderContextualized
            }
        ];

        // --- DOM Elements ---
        const stepTitle = document.getElementById('step-title');
        const stepDesc = document.getElementById('step-desc');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const animationStage = document.getElementById('animation-stage');
        const svgCanvas = document.getElementById('svg-canvas');
        const stepIndicator = document.getElementById('step-indicator');

        // --- Initialization ---
        function init() {
            // Setup indicators
            steps.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = `h-2 flex-1 mx-1 rounded-full ${index === 0 ? 'bg-blue-500' : 'bg-slate-700'}`;
                dot.id = `dot-${index}`;
                stepIndicator.appendChild(dot);
            });

            btnPrev.addEventListener('click', () => changeStep(-1));
            btnNext.addEventListener('click', () => changeStep(1));

            updateUI();
        }

        // --- Navigation ---
        function changeStep(dir) {
            currentStep += dir;
            if (currentStep < 0) currentStep = 0;
            if (currentStep >= steps.length) currentStep = steps.length - 1;
            updateUI();
        }

        function updateUI() {
            // Update Text
            stepTitle.innerHTML = steps[currentStep].title;
            stepDesc.innerHTML = steps[currentStep].desc;
            
            // Retrigger animations for text
            stepTitle.classList.remove('slide-up');
            stepDesc.classList.remove('slide-up');
            void stepTitle.offsetWidth; // trigger reflow
            stepTitle.classList.add('slide-up');
            stepDesc.classList.add('slide-up');

            // Update Buttons
            btnPrev.disabled = currentStep === 0;
            if (currentStep === steps.length - 1) {
                btnNext.innerHTML = '<i class="fas fa-check mr-2"></i> Selesai';
                btnNext.classList.replace('bg-blue-600', 'bg-green-600');
                btnNext.classList.replace('hover:bg-blue-500', 'hover:bg-green-500');
                btnNext.classList.replace('shadow-blue-900/50', 'shadow-green-900/50');
            } else {
                btnNext.innerHTML = 'Selanjutnya <i class="fas fa-arrow-right ml-2"></i>';
                btnNext.classList.replace('bg-green-600', 'bg-blue-600');
                btnNext.classList.replace('hover:bg-green-500', 'hover:bg-blue-500');
                btnNext.classList.replace('shadow-green-900/50', 'shadow-blue-900/50');
            }

            // Update Dots
            steps.forEach((_, index) => {
                const dot = document.getElementById(`dot-${index}`);
                if (index <= currentStep) {
                    dot.className = `h-2 flex-1 mx-1 rounded-full bg-blue-500 transition-colors duration-300`;
                } else {
                    dot.className = `h-2 flex-1 mx-1 rounded-full bg-slate-700 transition-colors duration-300`;
                }
            });

            // Clear Canvas and Run Animation
            animationStage.innerHTML = '';
            svgCanvas.innerHTML = '';
            steps[currentStep].animate();
        }

        // --- Animation Functions ---

        function createWordBlock(word, id, isVector = false, isGlow = false) {
            const block = document.createElement('div');
            block.id = id;
            block.className = `word-block flex flex-col items-center mx-3 fade-in ${isGlow ? 'pulse-glow' : ''}`;
            
            const textDiv = document.createElement('div');
            textDiv.className = `px-4 py-2 rounded text-lg font-bold shadow-lg ${isVector ? 'bg-blue-900 border border-blue-500 text-blue-100' : 'bg-slate-700 border border-slate-600 text-white'}`;
            textDiv.innerText = word;
            block.appendChild(textDiv);
            
            return block;
        }

        // Step 1
        function renderInput() {
            const container = document.createElement('div');
            container.className = "flex justify-center items-center h-full w-full";
            
            sentence.forEach((word, i) => {
                setTimeout(() => {
                    const block = createWordBlock(word, `word-${i}`);
                    container.appendChild(block);
                }, i * 200);
            });
            
            animationStage.appendChild(container);
        }

        // Step 2
        function renderEmbedding() {
            const container = document.createElement('div');
            container.className = "flex justify-center items-center h-full w-full";
            
            const mockVectors = [
                "[0.12, -0.5, 0.8]",
                "[0.01, 0.99, 0.2]",
                "[-0.8, 0.4, -0.1]",
                "[0.55, -0.2, 0.0]",
                "[0.77, 0.88, 0.1]"
            ];

            sentence.forEach((word, i) => {
                const block = createWordBlock(word, `word-${i}`, true);
                
                // Add vector representation below
                const vectorDiv = document.createElement('div');
                vectorDiv.className = "mt-4 font-mono text-xs text-blue-300 bg-slate-800 p-2 rounded border border-slate-700 fade-in flex flex-col items-center opacity-0";
                vectorDiv.style.animationDelay = `${(i * 100) + 500}ms`;
                vectorDiv.innerHTML = `<span class="block text-slate-500 mb-1">E(${i})</span>${mockVectors[i]}<br><span class="text-slate-500">...</span>`;
                
                block.appendChild(vectorDiv);
                container.appendChild(block);
            });
            
            animationStage.appendChild(container);
        }

        // Step 3
        function renderPositionalEncoding() {
            const container = document.createElement('div');
            container.className = "flex justify-center items-center h-full w-full relative";
            
            sentence.forEach((word, i) => {
                const block = createWordBlock(word, `word-${i}`, true);
                
                // Add Positional Encoding visual
                const peDiv = document.createElement('div');
                peDiv.className = "absolute -top-16 text-xs text-purple-400 bg-purple-900/30 border border-purple-500/50 p-2 rounded fade-in flex items-center justify-center";
                peDiv.style.animationDelay = `${i * 200}ms`;
                peDiv.innerHTML = `<i class="fas fa-wave-square mr-1"></i> PE(${i})`;
                
                // Plus sign
                const plusDiv = document.createElement('div');
                plusDiv.className = "absolute -top-6 text-white font-bold fade-in";
                plusDiv.style.animationDelay = `${(i * 200) + 100}ms`;
                plusDiv.innerHTML = "+";

                // Base vector
                const vectorDiv = document.createElement('div');
                vectorDiv.className = "mt-4 font-mono text-xs text-indigo-300 bg-slate-800 p-2 rounded border border-indigo-700/50 fade-in";
                vectorDiv.innerHTML = `E(${i}) + PE(${i})`;
                
                block.appendChild(peDiv);
                block.appendChild(plusDiv);
                block.appendChild(vectorDiv);
                container.appendChild(block);
            });
            
            animationStage.appendChild(container);
        }

        // Step 4
        function renderQKV() {
            const container = document.createElement('div');
            container.className = "flex justify-center items-center h-full w-full mt-24";
            
            sentence.forEach((word, i) => {
                const block = document.createElement('div');
                block.className = `flex flex-col items-center mx-4 fade-in relative`;
                block.style.animationDelay = `${i * 100}ms`;
                
                const textDiv = document.createElement('div');
                textDiv.className = `px-3 py-1 mb-6 rounded text-sm font-bold bg-slate-700 text-white`;
                textDiv.innerText = word;
                
                // QKV boxes
                const qkvContainer = document.createElement('div');
                qkvContainer.className = "flex space-x-1";
                
                const q = document.createElement('div');
                q.className = "w-6 h-12 bg-pink-900 border border-pink-500 rounded flex items-center justify-center text-xs font-bold text-pink-300";
                q.innerText = "Q";
                
                const k = document.createElement('div');
                k.className = "w-6 h-12 bg-yellow-900 border border-yellow-500 rounded flex items-center justify-center text-xs font-bold text-yellow-300";
                k.innerText = "K";
                
                const v = document.createElement('div');
                v.className = "w-6 h-12 bg-green-900 border border-green-500 rounded flex items-center justify-center text-xs font-bold text-green-300";
                v.innerText = "V";

                // Arrows pointing down
                const arrow = document.createElement('div');
                arrow.className = "text-slate-500 text-xs mb-1";
                arrow.innerHTML = `<i class="fas fa-arrow-down"></i>`;

                qkvContainer.appendChild(q);
                qkvContainer.appendChild(k);
                qkvContainer.appendChild(v);
                
                block.appendChild(textDiv);
                block.appendChild(arrow);
                block.appendChild(qkvContainer);
                
                container.appendChild(block);
            });
            
            animationStage.appendChild(container);
        }

        // Step 5
        function renderAttentionLines() {
            const container = document.createElement('div');
            container.className = "flex justify-center items-center h-full w-full relative z-10";
            
            const blocks = [];

            sentence.forEach((word, i) => {
                const block = document.createElement('div');
                block.id = `attn-word-${i}`;
                // Make the "Bank" block glow to show we are focusing on it
                const isBank = i === 0;
                block.className = `px-4 py-2 rounded text-lg font-bold shadow-lg mx-6 ${isBank ? 'bg-pink-900 border-2 border-pink-500 text-white z-20' : 'bg-slate-700 border border-slate-600 text-slate-300 z-10'}`;
                block.innerText = word;
                
                if(isBank) {
                    const tag = document.createElement('div');
                    tag.className = "absolute -top-6 left-1/2 transform -translate-x-1/2 text-xs font-bold text-pink-400 bg-slate-900 px-2 rounded";
                    tag.innerText = "Query";
                    block.appendChild(tag);
                    block.classList.add('relative');
                } else if (i === 2) { // sungai
                    const tag = document.createElement('div');
                    tag.className = "absolute -top-6 left-1/2 transform -translate-x-1/2 text-xs font-bold text-green-400 bg-slate-900 px-2 rounded";
                    tag.innerText = "Target Value";
                    block.appendChild(tag);
                    block.classList.add('relative');
                }

                container.appendChild(block);
                blocks.push(block);
            });
            
            animationStage.appendChild(container);

            // Draw lines after elements are in DOM
            setTimeout(() => {
                const rect0 = blocks[0].getBoundingClientRect();
                const containerRect = svgCanvas.getBoundingClientRect();

                const x1 = rect0.left + rect0.width / 2 - containerRect.left;
                const y1 = rect0.bottom - containerRect.top + 10; // Start slightly below "Bank"

                // Attention weights for "Bank" looking at other words
                const weights = [0.1, 0.05, 0.7, 0.05, 0.1]; // High weight on "sungai" (index 2)

                blocks.forEach((block, i) => {
                    const rect = block.getBoundingClientRect();
                    const x2 = rect.left + rect.width / 2 - containerRect.left;
                    const y2 = rect.top - containerRect.top - 10; // Connect to top of other words

                    // Create bezier curve line
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const cpY = y1 + 150; // Control point Y for curve
                    line.setAttribute('d', `M ${x1} ${y1} C ${x1} ${cpY}, ${x2} ${cpY}, ${x2} ${y2}`);
                    
                    const weight = weights[i];
                    line.setAttribute('stroke', weight > 0.5 ? '#10b981' : '#f472b6'); // green for high, pink for low
                    line.setAttribute('stroke-width', Math.max(1, weight * 10));
                    line.setAttribute('fill', 'none');
                    line.setAttribute('stroke-dasharray', '5,5');
                    line.classList.add('fade-in');
                    line.style.animationDelay = `${i * 150}ms`;
                    
                    // Add animated dot on path
                    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    dot.setAttribute('r', '4');
                    dot.setAttribute('fill', '#fbbf24'); // Yellow dot (Key matching)
                    
                    const animate = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
                    animate.setAttribute('dur', '2s');
                    animate.setAttribute('repeatCount', 'indefinite');
                    animate.setAttribute('path', `M ${x2} ${y2} C ${x2} ${cpY}, ${x1} ${cpY}, ${x1} ${y1}`); // flow back to Bank
                    
                    dot.appendChild(animate);
                    
                    svgCanvas.appendChild(line);
                    if(weight > 0.1) svgCanvas.appendChild(dot); // Only animate flowing info for relevant words
                });
            }, 100); // short delay to ensure rendering
        }

        // Step 6
        function renderContextualized() {
            const container = document.createElement('div');
            container.className = "flex justify-center items-center h-full w-full mt-20";
            
            sentence.forEach((word, i) => {
                const block = document.createElement('div');
                block.className = `flex flex-col items-center mx-4 fade-in`;
                block.style.animationDelay = `${i * 150}ms`;
                
                // Final vector representation
                const finalBox = document.createElement('div');
                // The output is a contextualized embedding
                finalBox.className = `w-20 h-24 bg-gradient-to-t from-blue-900 to-emerald-800 border-2 border-emerald-500 rounded-lg flex items-center justify-center shadow-lg shadow-emerald-900/50 relative overflow-hidden`;
                
                if(i === 0) { // Emphasize "Bank"
                    finalBox.classList.add('pulse-glow');
                    finalBox.classList.add('border-cyan-400');
                }

                // Add grid background to look like a matrix/vector
                const grid = document.createElement('div');
                grid.className = "absolute inset-0 opacity-20";
                grid.style.backgroundImage = "linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px)";
                grid.style.backgroundSize = "5px 5px";
                finalBox.appendChild(grid);

                const textDiv = document.createElement('div');
                textDiv.className = `mt-4 px-3 py-1 rounded text-sm font-bold bg-slate-700 text-white z-10`;
                textDiv.innerText = word;
                
                block.appendChild(finalBox);
                block.appendChild(textDiv);
                
                container.appendChild(block);
            });

            const formula = document.createElement('div');
            formula.className = "absolute top-10 text-center fade-in bg-slate-800/80 p-4 rounded border border-slate-600";
            formula.innerHTML = `<h3 class="text-emerald-400 font-bold mb-2">Representasi Kontekstual</h3><p class="text-sm text-slate-300">Setiap blok sekarang mengandung arti kata aslinya <strong>ditambah</strong> bobot dari konteks kata-kata di sekitarnya.</p>`;
            
            animationStage.appendChild(formula);
            animationStage.appendChild(container);
        }

        // Boot up
        window.onload = init;

        // Handle Window Resize for SVG lines
        window.addEventListener('resize', () => {
            if(currentStep === 4) {
                updateUI(); // Redraw lines if in the Attention step
            }
        });
    </script>
</body>
</html>
